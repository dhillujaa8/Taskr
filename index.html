<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Taskr</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Barlow+Condensed:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  /* ── Reset & Tokens ──────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d0d0d;
    --surface:   #141414;
    --surface2:  #1c1c1c;
    --border:    #2a2a2a;
    --border2:   #3a3a3a;
    --text:      #e8e8e8;
    --muted:     #666;
    --accent:    #e8ff47;
    --accent-d:  #b8cc1a;
    --high:      #ff4757;
    --med:       #ffa502;
    --low:       #2ed573;
    --done-fg:   #444;
    --radius:    2px;
    --mono:      'Space Mono', monospace;
    --display:   'Barlow Condensed', sans-serif;
  }

  html { background: var(--bg); color: var(--text); font-family: var(--mono); }

  body {
    min-height: 100vh;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px),
      var(--bg);
  }

  /* ── Layout ─────────────────────────────────────────── */
  .wrapper {
    max-width: 760px;
    margin: 0 auto;
    padding: 0 16px 80px;
  }

  /* ── Header ─────────────────────────────────────────── */
  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 48px 0 28px;
    border-bottom: 3px solid var(--accent);
    margin-bottom: 32px;
  }

  .logo {
    font-family: var(--display);
    font-size: 72px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -2px;
    color: var(--accent);
    text-transform: uppercase;
  }

  .logo span {
    color: var(--text);
    font-weight: 300;
  }

  .tagline {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    padding-bottom: 8px;
  }

  /* ── Stats Bar ──────────────────────────────────────── */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    margin-bottom: 28px;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    transition: border-color .15s;
  }

  .stat:hover { border-color: var(--border2); }

  .stat-val {
    font-family: var(--display);
    font-size: 40px;
    font-weight: 700;
    line-height: 1;
    color: var(--accent);
    transition: color .2s;
  }

  .stat-label {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ── Add Form ───────────────────────────────────────── */
  .add-form {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px;
    margin-bottom: 28px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .add-form-row {
    display: flex;
    gap: 8px;
  }

  .input-task {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
    border-radius: var(--radius);
    transition: border-color .15s;
  }

  .input-task:focus { border-color: var(--accent); }
  .input-task::placeholder { color: var(--muted); }

  .select-priority {
    background: var(--bg);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px 12px;
    outline: none;
    border-radius: var(--radius);
    cursor: pointer;
    transition: border-color .15s;
  }

  .select-priority:focus { border-color: var(--accent); }

  .btn-add {
    background: var(--accent);
    color: #000;
    border: none;
    font-family: var(--display);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 10px 24px;
    cursor: pointer;
    border-radius: var(--radius);
    transition: background .15s, transform .1s;
    white-space: nowrap;
  }

  .btn-add:hover  { background: var(--accent-d); }
  .btn-add:active { transform: scale(.97); }

  /* ── Filter Tabs ────────────────────────────────────── */
  .filters {
    display: flex;
    gap: 2px;
    margin-bottom: 16px;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 18px;
    cursor: pointer;
    border-radius: var(--radius);
    transition: all .15s;
    flex: 1;
  }

  .filter-btn:hover { border-color: var(--border2); color: var(--text); }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 700;
  }

  /* ── Todo List ──────────────────────────────────────── */
  .todo-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .todo-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid transparent;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    transition: border-color .15s, opacity .2s, transform .2s;
    animation: slideIn .2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .todo-item:hover { border-color: var(--border2); }
  .todo-item[data-priority="high"]   { border-left-color: var(--high); }
  .todo-item[data-priority="medium"] { border-left-color: var(--med); }
  .todo-item[data-priority="low"]    { border-left-color: var(--low); }
  .todo-item.done { opacity: .45; }

  /* Checkbox */
  .check-wrap {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    position: relative;
  }

  .check-wrap input[type="checkbox"] {
    appearance: none;
    width: 100%;
    height: 100%;
    border: 1px solid var(--border2);
    background: var(--bg);
    cursor: pointer;
    border-radius: 1px;
    transition: background .15s, border-color .15s;
  }

  .check-wrap input[type="checkbox"]:checked {
    background: var(--accent);
    border-color: var(--accent);
  }

  .check-wrap input[type="checkbox"]:checked::after {
    content: "✓";
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 11px;
    font-weight: 700;
    color: #000;
    pointer-events: none;
  }

  /* Text */
  .todo-text {
    flex: 1;
    font-size: 13px;
    line-height: 1.4;
    word-break: break-word;
    transition: color .2s, text-decoration .2s;
  }

  .todo-item.done .todo-text {
    color: var(--done-fg);
    text-decoration: line-through;
  }

  /* Priority badge */
  .badge {
    font-family: var(--display);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 1px;
    flex-shrink: 0;
  }

  .badge-high   { background: #ff475720; color: var(--high); border: 1px solid #ff475740; }
  .badge-medium { background: #ffa50220; color: var(--med);  border: 1px solid #ffa50240; }
  .badge-low    { background: #2ed57320; color: var(--low);  border: 1px solid #2ed57340; }

  /* Delete btn */
  .btn-delete {
    background: transparent;
    border: 1px solid transparent;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 16px;
    line-height: 1;
    padding: 4px 8px;
    cursor: pointer;
    border-radius: var(--radius);
    opacity: 0;
    transition: all .15s;
    flex-shrink: 0;
  }

  .todo-item:hover .btn-delete { opacity: 1; }
  .btn-delete:hover { color: var(--high); border-color: #ff475740; background: #ff475715; }

  /* ── Empty State ────────────────────────────────────── */
  .empty {
    text-align: center;
    padding: 60px 0;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    border: 1px dashed var(--border);
    display: none;
  }

  .empty.show { display: block; }

  /* ── Toast ──────────────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-left: 3px solid var(--accent);
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    padding: 10px 16px;
    opacity: 0;
    transform: translateY(8px);
    transition: all .2s;
    pointer-events: none;
    z-index: 99;
  }

  .toast.show { opacity: 1; transform: translateY(0); }

  /* ── Scrollbar ──────────────────────────────────────── */
  ::-webkit-scrollbar       { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); }
</style>
</head>
<body>

<div class="wrapper">

  <header>
    <div class="logo">Taskr<span>.</span></div>
    <div class="tagline">Task Management System v1.0</div>
  </header>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat">
      <span class="stat-val" id="stat-total">0</span>
      <span class="stat-label">Total</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="stat-active" style="color:#e8e8e8">0</span>
      <span class="stat-label">Active</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="stat-done" style="color:var(--low)">0</span>
      <span class="stat-label">Completed</span>
    </div>
  </div>

  <!-- Add Form -->
  <div class="add-form">
    <div class="add-form-row">
      <input class="input-task" id="input-task" type="text"
             placeholder="Add a new task..." autocomplete="off"/>
      <select class="select-priority" id="select-priority">
        <option value="high">⬤ HIGH</option>
        <option value="medium" selected>⬤ MED</option>
        <option value="low">⬤ LOW</option>
      </select>
      <button class="btn-add" id="btn-add">+ Add Task</button>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="active">Active</button>
    <button class="filter-btn" data-filter="done">Done</button>
  </div>

  <!-- List -->
  <div class="todo-list" id="todo-list"></div>
  <div class="empty" id="empty">// no tasks found</div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────────────────────
//  Taskr Frontend — communicates with /api/todos
// ─────────────────────────────────────────────────────────────

// When running as standalone HTML (no server), we use a local
// in-memory store and shim the fetch calls.
const STANDALONE = (() => {
  try { return window.location.protocol === 'file:' || !true; }
  catch { return true; }
})();

// ── In-memory shim (mirrors db.js exactly) ───────────────────
const localDB = (() => {
  let todos = [
    { id:1, text:"Design system architecture", priority:"high",   done:false, createdAt: Date.now()-86400000 },
    { id:2, text:"Write API documentation",    priority:"medium", done:false, createdAt: Date.now()-72000000 },
    { id:3, text:"Set up CI/CD pipeline",      priority:"high",   done:true,  createdAt: Date.now()-50000000 },
    { id:4, text:"Code review for PR #42",     priority:"medium", done:false, createdAt: Date.now()-36000000 },
    { id:5, text:"Update dependencies",        priority:"low",    done:true,  createdAt: Date.now()-10000000 },
  ];
  let nextId = 6;

  const sorted = () => [...todos].sort((a,b) => b.createdAt - a.createdAt);

  return {
    getAll(filter='all') {
      let list = sorted();
      if (filter === 'active') list = list.filter(t => !t.done);
      if (filter === 'done')   list = list.filter(t =>  t.done);
      return { ok:true, data: list };
    },
    stats() {
      return { ok:true, data:{
        total:  todos.length,
        active: todos.filter(t => !t.done).length,
        done:   todos.filter(t =>  t.done).length,
      }};
    },
    create({ text, priority='medium' }) {
      if (!text?.trim()) return { ok:false, error:'Text required.' };
      const t = { id:nextId++, text:text.trim(), priority, done:false, createdAt:Date.now() };
      todos.unshift(t);
      return { ok:true, data:t };
    },
    update(id, patches) {
      const idx = todos.findIndex(t => t.id === id);
      if (idx===-1) return { ok:false, error:'Not found.' };
      todos[idx] = { ...todos[idx], ...patches };
      return { ok:true, data:todos[idx] };
    },
    remove(id) {
      const idx = todos.findIndex(t => t.id === id);
      if (idx===-1) return { ok:false, error:'Not found.' };
      todos.splice(idx,1);
      return { ok:true, data:{id} };
    },
  };
})();

// ── API Layer ────────────────────────────────────────────────
const api = {
  async get(filter='all') {
    if (STANDALONE) return localDB.getAll(filter);
    const r = await fetch(`/api/todos?filter=${filter}`);
    return r.json();
  },
  async stats() {
    if (STANDALONE) return localDB.stats();
    const r = await fetch('/api/todos/stats');
    return r.json();
  },
  async create(text, priority) {
    if (STANDALONE) return localDB.create({ text, priority });
    const r = await fetch('/api/todos', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ text, priority }),
    });
    return r.json();
  },
  async toggle(id, done) {
    if (STANDALONE) return localDB.update(id, { done });
    const r = await fetch(`/api/todos/${id}`, {
      method:'PATCH', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ done }),
    });
    return r.json();
  },
  async remove(id) {
    if (STANDALONE) return localDB.remove(id);
    const r = await fetch(`/api/todos/${id}`, { method:'DELETE' });
    return r.json();
  },
};

// ── State ────────────────────────────────────────────────────
let currentFilter = 'all';

// ── DOM Refs ─────────────────────────────────────────────────
const $list     = document.getElementById('todo-list');
const $empty    = document.getElementById('empty');
const $input    = document.getElementById('input-task');
const $priority = document.getElementById('select-priority');
const $btnAdd   = document.getElementById('btn-add');
const $toast    = document.getElementById('toast');
const $total    = document.getElementById('stat-total');
const $active   = document.getElementById('stat-active');
const $done     = document.getElementById('stat-done');

// ── Toast ────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  $toast.textContent = msg;
  $toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => $toast.classList.remove('show'), 2200);
}

// ── Render ───────────────────────────────────────────────────
function renderTodos(todos) {
  $list.innerHTML = '';

  if (!todos.length) {
    $empty.classList.add('show');
    return;
  }
  $empty.classList.remove('show');

  todos.forEach(todo => {
    const el = document.createElement('div');
    el.className = `todo-item${todo.done ? ' done' : ''}`;
    el.dataset.priority = todo.priority;
    el.dataset.id = todo.id;

    el.innerHTML = `
      <div class="check-wrap">
        <input type="checkbox" ${todo.done ? 'checked' : ''}
               aria-label="Mark complete" />
      </div>
      <span class="todo-text">${escHtml(todo.text)}</span>
      <span class="badge badge-${todo.priority}">
        ${todo.priority === 'medium' ? 'MED' : todo.priority.toUpperCase()}
      </span>
      <button class="btn-delete" aria-label="Delete task">✕</button>
    `;

    el.querySelector('input[type="checkbox"]').addEventListener('change', async (e) => {
      const res = await api.toggle(todo.id, e.target.checked);
      if (res.ok) { refresh(); showToast(e.target.checked ? '✓ Task completed' : '↩ Task reopened'); }
    });

    el.querySelector('.btn-delete').addEventListener('click', async () => {
      el.style.opacity = '0';
      el.style.transform = 'translateX(12px)';
      el.style.transition = 'all .2s';
      setTimeout(async () => {
        const res = await api.remove(todo.id);
        if (res.ok) { refresh(); showToast('✕ Task deleted'); }
      }, 180);
    });

    $list.appendChild(el);
  });
}

function updateStats(s) {
  animateCount($total,  parseInt($total.textContent)  || 0, s.total);
  animateCount($active, parseInt($active.textContent) || 0, s.active);
  animateCount($done,   parseInt($done.textContent)   || 0, s.done);
}

function animateCount(el, from, to) {
  if (from === to) return;
  const diff = to - from;
  const steps = Math.min(Math.abs(diff), 20);
  let i = 0;
  const t = setInterval(() => {
    i++;
    el.textContent = Math.round(from + (diff * i) / steps);
    if (i >= steps) clearInterval(t);
  }, 20);
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Refresh ──────────────────────────────────────────────────
async function refresh() {
  const [todosRes, statsRes] = await Promise.all([
    api.get(currentFilter),
    api.stats(),
  ]);
  if (todosRes.ok) renderTodos(todosRes.data);
  if (statsRes.ok) updateStats(statsRes.data);
}

// ── Add Task ─────────────────────────────────────────────────
async function addTask() {
  const text = $input.value.trim();
  if (!text) { $input.focus(); $input.style.borderColor='var(--high)'; setTimeout(()=>$input.style.borderColor='',800); return; }

  const res = await api.create(text, $priority.value);
  if (res.ok) {
    $input.value = '';
    $priority.value = 'medium';
    currentFilter = 'all';
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === 'all'));
    refresh();
    showToast('+ Task added');
  } else {
    showToast('Error: ' + res.error);
  }
}

// ── Event Listeners ──────────────────────────────────────────
$btnAdd.addEventListener('click', addTask);
$input.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentFilter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    refresh();
  });
});

// ── Init ─────────────────────────────────────────────────────
refresh();
</script>
</body>
</html>
